services:
  # Python backend API
  - type: web
    name: food-calorie-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /

  # Static frontend
  - type: web
    name: food-calorie-web
    env: static
    plan: free
    rootDir: .
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
