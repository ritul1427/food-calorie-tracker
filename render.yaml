services:
  - type: web
    name: food-calorie-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health

  - type: web
    name: food-calorie-web
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
