<script>
  analyzeBtn.addEventListener('click', async () => {
    const file = mealPhoto.files?.[0];
    if (!file) {
      alert('Please upload image');
      return;
    }

    statusEl.textContent = 'Analyzing...';
    analysisBadge.textContent = 'Analyzing...';
    analyzeBtn.disabled = true;

    try {
      const fd = new FormData();
      fd.append('file', file);

      // Abort request if backend is cold/stuck too long
      const controller = new AbortController();
      const timeoutMs = 45000; // 45 seconds
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      let res;
      try {
        res = await fetch(`${API_BASE_URL}/analyze`, {
          method: 'POST',
          body: fd,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timeoutId);
      }

      if (!res.ok) {
        const errText = await res.text().catch(() => '');
        throw new Error(`Analyze failed: ${res.status} ${errText}`);
      }

      const data = await res.json();

      currentAnalysis = {
        fileName: file.name,
        items: data.items.map((it, idx) => ({
          id: (globalThis.crypto && crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}_${idx}`,
          ...it
        })),
        totals: data.totals,
        meanConfidence: data.mean_confidence
      };

      renderAnalysisTable(currentAnalysis.items);
      renderMealTotals(currentAnalysis.totals, currentAnalysis.meanConfidence);
      resultArea.style.display = 'block';
      statusEl.textContent = 'Analysis complete';
      analysisBadge.textContent = `Done (${Math.round(currentAnalysis.meanConfidence * 100)}%)`;
    } catch (err) {
      console.error(err);

      if (err.name === 'AbortError') {
        statusEl.textContent = 'Request timed out (free-tier cold start). Please try again.';
        analysisBadge.textContent = 'Timeout';
        alert('Analyze timed out. Wait 30–60s and try again.');
      } else {
        statusEl.textContent = `Analysis failed: ${err.message}`;
        analysisBadge.textContent = 'Failed';
        alert(`Analysis failed: ${err.message}`);
      }
    } finally {
      analyzeBtn.disabled = false; // always reset button
    }
  });
</script>
